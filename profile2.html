<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register — Elitera Academy</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600;700&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --dark: #ffffff;
      --dark-2: #f0f0f0;
      --off-white: #1a1a2e;
      --muted: #444455;
      --blue: #1a1a8c;
    }

    body {
      font-family: 'Montserrat', sans-serif;
      background-color: var(--dark-2);
      color: var(--off-white);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 5vw;
    }

    /* TOP BACK NAVIGATION LINK */
    .top-nav {
      width: 100%;
      max-width: 520px;
      margin-bottom: 1.2rem;
      display: flex;
      justify-content: flex-start;
    }
    .btn-back-main {
      font-size: 0.72rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: var(--blue);
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      font-weight: 500;
      transition: opacity 0.25s;
    }
    .btn-back-main:hover {
      opacity: 0.7;
    }

    .auth-container {
      background: var(--dark);
      border: 1px solid rgba(26,26,140,0.12);
      border-top: 4px solid var(--blue);
      width: 100%;
      max-width: 520px;
      padding: 3rem 2.5rem;
      position: relative;
      box-shadow: 0 12px 40px rgba(26,26,140,0.04);
    }

    .corner {
      position: absolute;
      width: 16px; height: 16px;
      border-color: var(--blue);
      border-style: solid;
      opacity: 0.6;
    }
    .corner.tl { top: 15px; left: 15px; border-width: 1px 0 0 1px; }
    .corner.tr { top: 15px; right: 15px; border-width: 1px 1px 0 0; }
    .corner.bl { bottom: 15px; left: 15px; border-width: 0 0 1px 1px; }
    .corner.br { bottom: 15px; right: 15px; border-width: 0 1px 1px 0; }

    .brand-header {
      text-align: center;
      margin-bottom: 2rem;
    }
    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 700;
      letter-spacing: 0.08em;
      color: var(--blue);
      text-decoration: none;
      display: block;
      margin-bottom: 0.4rem;
    }
    .logo span { color: var(--off-white); font-weight: 300; }
    
    .brand-header p {
      font-size: 0.72rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
    }
    .full-width {
      grid-column: 1 / -1;
    }

    .form-group {
      margin-bottom: 1.2rem;
    }
    label {
      display: block;
      font-size: 0.68rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.5rem;
      font-weight: 500;
    }
    input, select {
      width: 100%;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.85rem;
      padding: 0.8rem 1rem;
      background: #fdfdfd;
      border: 1px solid rgba(26,26,140,0.2);
      color: var(--off-white);
      transition: border-color 0.25s;
    }
    input:focus, select:focus {
      outline: none;
      border-color: var(--blue);
    }

    .terms-box {
      display: flex;
      align-items: flex-start;
      gap: 0.6rem;
      margin: 0.5rem 0 1.8rem;
    }
    .terms-box input { width: auto; margin-top: 2px; }
    .terms-box p {
      font-size: 0.72rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .btn-submit {
      width: 100%;
      font-family: 'Montserrat', sans-serif;
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #fff;
      background: var(--blue);
      border: 1px solid var(--blue);
      padding: 1rem;
      cursor: pointer;
      transition: background 0.25s, color 0.25s;
    }
    .btn-submit:hover {
      background: transparent;
      color: var(--blue);
    }

    .auth-footer {
      text-align: center;
      margin-top: 2rem;
      font-size: 0.78rem;
      color: var(--muted);
    }
    .auth-footer a {
      color: var(--blue);
      text-decoration: none;
      font-weight: 500;
    }
    .auth-footer a:hover { text-decoration: underline; }
  </style>
</head>
<body>

  <!-- GO BACK BUTTON CONTAINER -->
  <div class="top-nav">
    <a href="Elitra.html" class="btn-back-main">← Back to Academy</a>
  </div>

  <div class="auth-container">
    <div class="corner tl"></div><div class="corner tr"></div>
    <div class="corner bl"></div><div class="corner br"></div>

    <div class="brand-header">
      <a href="Elitra.html" class="logo">Elitera<span> Academy</span></a>
      <p>Candidate Registration</p>
    </div>

    <!-- ACTION REDIRECTS TO PROFILE2.HTML -->
    <form id="registerForm" action="profile2.html" method="GET">
      <div class="form-grid">
        
        <div class="form-group">
          <label for="firstname">First Name</label>
          <input type="text" id="firstname" name="firstname" required placeholder="John">
        </div>

        <div class="form-group">
          <label for="lastname">Last Name</label>
          <input type="text" id="lastname" name="lastname" required placeholder="Doe">
        </div>

        <div class="form-group full-width">
          <label for="email">Email Address</label>
          <input type="email" id="email" name="email" required placeholder="john.doe@example.com">
        </div>

        <div class="form-group full-width">
          <label for="location">Location / Region</label>
          <select id="location" name="location">
            <option value="DZ">Algeria (DZ)</option>
            <option value="International">International Option</option>
          </select>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <input type="password" id="password" name="password" required placeholder="••••••••">
        </div>

        <div class="form-group">
          <label for="confirm_password">Confirm Password</label>
          <input type="password" id="confirm_password" name="confirm_password" required placeholder="••••••••">
        </div>

      </div>

      <div class="terms-box">
        <input type="checkbox" id="terms" name="terms" required>
        <p><label for="terms" style="display:inline; text-transform:none; letter-spacing:normal; font-size:0.72rem;">I certify that my profile metrics represent authentic registration statements for evaluation.</label></p>
      </div>

      <button type="submit" class="btn-submit">Register Account</button>
    </form>

    <div class="auth-footer">
      Existing account? <a href="profile.html">Login Profile</a><br><br>
      <span style="font-size:0.68rem; opacity:0.7;">System admin? <a href="profile.html" onclick="localStorage.setItem('targetRole', 'admin')">Administrator access Terminal</a></span>
    </div>
  </div>

</body>
</html>
